<!DOCTYPE html>
<html>
<head>
    <title>Campus Lost & Found</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand" href="home.html">Lost&Found</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto ms-4">
            <li class="nav-item">
                <a class="nav-link" href="home.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="index.html">Browse Items</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="add.html">Report Item</a>
            </li>
        </ul>

        <div id="authButtons"></div>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-2">Campus Lost & Found</h1>
    <p class="text-center mb-5">
        Helping Students Reconnect With Their Lost Items
    </p>

    <!-- Dashboard -->
    <div class="row text-center mb-5">
        <div class="col-md-3">
            <div class="dashboard-card">
                <h5>Total</h5>
                <h3 id="totalItems">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="dashboard-card">
                <h5>Lost</h5>
                <h3 id="totalLost" class="text-danger">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="dashboard-card">
                <h5>Found</h5>
                <h3 id="totalFound" class="text-info">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="dashboard-card">
                <h5>Claimed</h5>
                <h3 id="totalClaimed" class="text-success">0</h3>
            </div>
        </div>
    </div>

    <!-- Filter -->
    <div class="row mb-4">
        <div class="col-md-3">
            <select id="filterStatus" class="form-select">
                <option value="All">Show All</option>
                <option value="Lost">Lost</option>
                <option value="Found">Found</option>
                <option value="Claimed">Claimed</option>
            </select>
        </div>

        <div class="col-md-3">
            <input type="text" id="searchInput"
                class="form-control"
                placeholder="Search title...">
        </div>
    </div>

    <!-- Items -->
    <div id="items"></div>

</div>

<footer>
    © 2026 Campus Lost & Found System
</footer>

<script src="script.js"></script>

</body>
</html>
