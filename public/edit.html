<!DOCTYPE html>
<html>
<head>
    <title>Edit Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand" href="home.html">Lost&Found</a>
</nav>

<div class="container mt-5" style="max-width:800px;">
    <div class="glass-card p-4">

        <h4 class="mb-4">Edit Item</h4>

        <form id="editForm" class="row g-3">

            <div class="col-md-6">
                <select name="category" class="form-select" required>
                    <option value="Lost">Lost</option>
                    <option value="Found">Found</option>
                </select>
            </div>

            <div class="col-md-6">
                <input name="type" class="form-control" required>
            </div>

            <div class="col-md-6">
                <input name="title" class="form-control" required>
            </div>

            <div class="col-md-6">
                <input name="description" class="form-control" required>
            </div>

            <div class="col-md-6">
                <input name="location" class="form-control" required>
            </div>

            <div class="col-md-6">
                <input type="date" name="date" class="form-control" required>
            </div>

            <div class="col-md-6">
                <input name="contact" class="form-control" required>
            </div>

            <div class="col-12">
                <button class="btn btn-primary w-100">
                    Update
                </button>
            </div>

        </form>

    </div>
</div>

<script>

const urlParams = new URLSearchParams(window.location.search)
const id = urlParams.get("id")

// 登录检查
fetch("/check-login")
.then(res => res.json())
.then(data => {
    if(!data.loggedIn){
        window.location.href = "login.html"
    }
})

// 加载数据
fetch("/items")
.then(res => res.json())
.then(data => {

    const item = data.find(i => i.id == id)

    if(!item || !item.isOwner){
        alert("You cannot edit this item")
        window.location.href = "index.html"
        return
    }

    document.querySelector("[name=category]").value = item.category
    document.querySelector("[name=type]").value = item.type
    document.querySelector("[name=title]").value = item.title
    document.querySelector("[name=description]").value = item.description
    document.querySelector("[name=location]").value = item.location
    document.querySelector("[name=date]").value = item.date?.split("T")[0]
    document.querySelector("[name=contact]").value = item.contact
})

document.getElementById("editForm").addEventListener("submit", async e => {
    e.preventDefault()

    const formData = new FormData(e.target)

    await fetch(`/items/edit/${id}`, {
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(Object.fromEntries(formData))
    })

    window.location.href = "index.html"
})

</script>

</body>
</html>
