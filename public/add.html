<!DOCTYPE html>
<html>
<head>
    <title>Add Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container mt-5 main-container" style="max-width:800px;">

    <h3 class="mb-4 text-center">Report  Item</h3>

    <form id="addForm" class="row g-3">

        <div class="col-md-6">
            <select name="category" class="form-select" required>
                <option value="">Category</option>
                <option value="Lost">Lost</option>
                <option value="Found">Found</option>
            </select>
        </div>

        <div class="col-md-6">
            <select name="type" class="form-select" required>
                <option value="">Item Type</option>
                <option>Electronics</option>
                <option>Wallet</option>
                <option>Documents</option>
                <option>Accessories</option>
                <option>Others</option>
            </select>
        </div>

        <div class="col-md-6">
            <input name="title" class="form-control" placeholder="Title" required>
        </div>

        <div class="col-md-6">
            <input name="description" class="form-control" placeholder="Description" required>
        </div>

        <div class="col-md-6">
            <input name="location" class="form-control" placeholder="Location" required>
        </div>

        <div class="col-md-6">
            <input type="date" name="date" class="form-control" required>
        </div>

        <div class="col-md-6">
            <input name="contact" class="form-control" placeholder="Contact" required>
        </div>

        <div class="col-12">
            <button class="btn btn-primary w-100">Submit</button>
        </div>

    </form>

</div>

<script>

// 未登录禁止进入
fetch("/check-login")
.then(res => res.json())
.then(data => {
    if(!data.loggedIn){
        window.location.href = "login.html"
    }
})

document.getElementById("addForm").addEventListener("submit", async e => {
    e.preventDefault()

    const formData = new FormData(e.target)

    await fetch("/items", {
        method:"POST",
        body: new URLSearchParams(formData)
    })

    window.location.href = "index.html"
})

</script>

</body>
</html>
