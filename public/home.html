<!DOCTYPE html>
<html>
<head>
    <title>Lost & Found Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

    <!-- Logo + System Name -->
    <a class="navbar-brand d-flex align-items-center" href="home.html">
        <img src="/images/qiu-logo.png.png"
             alt="QIU Logo"
             height="40"
             class="me-2">
        <span>Campus Lost & Found</span>
    </a>

    <!-- Menu -->
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto ms-4">
            <li class="nav-item">
                <a class="nav-link" href="home.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="index.html">Browse Items</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="add.html">Report Item</a>
            </li>

        <li class="nav-item">
        <a class="nav-link active" href="about.html">About</a>
      </li>
        </ul>

        <div id="authButtons"></div>
    </div>

</nav>

<!-- HERO SECTION -->
<section class="hero text-center text-white position-relative">

    <!-- Particles Background -->
    <div id="particles-js"
         style="position:absolute;width:100%;height:100%;z-index:-1;"></div>

    <div class="container py-5">

        <h1 data-aos="fade-down">
            Lost Something?<br>
            <span class="gradient-text">We’ll Help You Find It</span>
        </h1>

        <p class="mt-3" data-aos="fade-up">
            A centralized platform for students to report and recover lost items.
        </p>

        <div class="mt-4" data-aos="zoom-in">
            <a href="add.html" class="btn btn-danger me-3">
                Report Lost Item
            </a>
            <a href="add.html" class="btn btn-success">
                Report Found Item
            </a>
        </div>

    </div>

</section>

<footer class="text-center text-white py-3 bg-dark">
    © 2026 Campus Lost & Found
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="script.js"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    color: { value: "#a855f7" },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#22d3ee",
      opacity: 0.4
    },
    move: { enable: true, speed: 2 }
  }
});

AOS.init({ duration: 1000, once: true });
</script>

</body>
</html>
